# URL for the pkgdown site
url: https://thomaswiemann.com/bayesm.HART

template:
  bootstrap: 5

home:
  title: Bayesian Multinomial Logit Models with HART Priors
  description: Implements the Metropolis-within-Gibbs sampler for Bayesian hierarchical models with HART priors.
